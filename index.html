<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>Matrix Besturing v1.0</title>
    <script src="https://unpkg.com/obs-websocket-js"></script>
    <style>
        body { background-color: #1e1e1e; color: #fff; font-family: sans-serif; padding: 20px; }
        .container { display: flex; gap: 20px; }
        .box { background: #2a2a2a; padding: 20px; border-radius: 5px; width: 300px; }
        h1 { color: #4caf50; }
        select, button { width: 100%; padding: 10px; margin-top: 10px; border-radius: 5px; border: none; font-weight: bold; }
        button { background-color: #4caf50; color: white; cursor: pointer; }
        button:hover { background-color: #45a049; }
        .status-box { background: #111; height: 150px; display: flex; align-items: center; justify-content: center; font-size: 24px; border: 2px solid #333; }
    </style>
</head>
<body>

    <h1>Matrix Besturing</h1>
    <p>Selecteer een video-input voor de zender.</p>

    <div class="container">
        <div class="box">
            <h3>Crosspoint Instellen</h3>
            <label for="videoInput">Video Input</label>
            <select id="videoInput">
                <option value="PE5CW">Main Stream</option>
                <option value="Server WebCam">Server WebCam</option>
                <option value="Camera 1">Camera 1</option>
                <option value="Camera 2">Camera 2</option>
                <option value="">Beta</option>
                <option value="Camera Switch">luxemburg Camera</option>
            </select>
            <button onclick="schakelScene()">Crosspoint Instellen</button>
        </div>

        <div class="box">
            <h3>Live Status</h3>
            <div class="status-box" id="liveStatus">Laden...</div>
        </div>
    </div>

    <script>
        // We controleren eerst of de bibliotheek netjes geladen is via 'window'
        const OBSClient = window.OBSWebSocket ? window.OBSWebSocket.default : null;
        
        if (!OBSClient) {
            alert("Fout: De OBS-softwarebibliotheek kon niet worden geladen. Controleer of je internetverbinding hebt.");
        }

        const obs = new OBSClient();
        
        async function connectOBS() {
            try {
                // VERVANG HIERONDER JE WACHTWOORD ALS DAT IN OBS STAAT INGESTELD
                await obs.connect('ws://192.168.1.21:4455', 'cxFP1n4QWzeNC6g3');
                console.log("Verbonden met OBS!");
                updateStatus();
            } catch (error) {
                console.error("Verbinding mislukt:", error);
                document.getElementById('liveStatus').innerText = "Geen OBS gevonden";
            }
        }

        // Vraag aan OBS welke scène nu live is
        async function updateStatus() {
            try {
                const { currentProgramSceneName } = await obs.call('GetCurrentProgramScene');
                document.getElementById('liveStatus').innerText = currentProgramSceneName;
            } catch (e) {
                console.log("Status ophalen mislukt");
            }
        }

        // Schakel naar de gekozen scène uit de dropdown
        async function schakelScene() {
            const gekozenScene = document.getElementById('videoInput').value;
            try {
                await obs.call('SetCurrentProgramScene', { sceneName: gekozenScene });
                updateStatus();
            } catch (error) {
                alert("Schakelen mislukt. Bestaat de scène '"+gekozenScene+"' wel in OBS?");
            }
        }

        // Luister of de scène in OBS handmatig wordt aangepast, update dan de status
        obs.on('CurrentProgramSceneChanged', data => {
            document.getElementById('liveStatus').innerText = data.sceneName;
        });

        // Start de verbinding bij het openen van de pagina
        connectOBS();
    </script>
</body>
</html>
